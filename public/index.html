<!DOCTYPE html>
<html>
<head>
    <title>Ultraviolet Proxy</title>
    <style>
        body { background: #000; color: #fff; font-family: Arial; padding: 50px; text-align: center; }
        input, button { padding: 10px; margin: 5px; }
        .bookmark { display: inline-block; padding: 10px; margin: 5px; background: #333; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Ultraviolet Proxy</h1>
    <input id="url" size="50" placeholder="Enter URL (e.g., google.com)">
    <button onclick="go()">Go</button>
    
    <div style="margin-top: 20px;">
        <div class="bookmark" onclick="loadSite('now.gg')">🎮 Roblox</div>
        <div class="bookmark" onclick="loadSite('youtube.com')">📺 YouTube</div>
        <div class="bookmark" onclick="loadSite('spotify.com')">🎵 Spotify</div>
    </div>
    
    <iframe id="frame" style="width:100%; height:600px; margin-top:20px; border:1px solid #333;"></iframe>

    <script>
    function go() {
        let site = document.getElementById('url').value;
        if (!site.startsWith('http')) site = 'https://' + site;
        document.getElementById('frame').src = '/uv/service/' + site;
    }
    
    function loadSite(site) {
        document.getElementById('url').value = site;
        go();
    }
    </script>
</body>
</html>
