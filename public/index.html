<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LearnSphere - STEM Learning Portal</title>

    <!-- Modern STEM-themed styling -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: linear-gradient(135deg, #0a192f 0%, #112240 100%);
        color: #ffffff;
        font-family: "Inter", "Segoe UI", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        position: relative;
        overflow-x: hidden;
      }

      /* Animated math/STEM background */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: radial-gradient(
            circle at 20% 30%,
            rgba(100, 255, 218, 0.03) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 80% 70%,
            rgba(100, 255, 218, 0.03) 0%,
            transparent 50%
          ),
          repeating-linear-gradient(
            45deg,
            rgba(100, 255, 218, 0.02) 0px,
            rgba(100, 255, 218, 0.02) 2px,
            transparent 2px,
            transparent 8px
          );
        pointer-events: none;
        z-index: 0;
      }

      /* Main container */
      #learnsphere-container {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* Hero section - initially visible */
      .hero-section {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 2rem;
        transition: opacity 0.3s ease;
      }

      .hero-section.hidden {
        display: none;
      }

      /* STEM logo/branding */
      .stem-brand {
        text-align: center;
        margin-bottom: 3rem;
      }

      .stem-icon {
        display: flex;
        justify-content: center;
        gap: 1.5rem;
        margin-bottom: 1.5rem;
      }

      .stem-icon svg {
        width: 50px;
        height: 50px;
        filter: drop-shadow(0 0 10px rgba(100, 255, 218, 0.3));
      }

      .stem-icon svg path,
      .stem-icon svg circle,
      .stem-icon svg line {
        stroke: #64ffda;
        stroke-width: 2;
        fill: none;
      }

      .stem-brand h1 {
        font-size: 3.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #64ffda 0%, #00bcd4 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -0.5px;
        margin-bottom: 0.5rem;
        text-shadow: 0 0 20px rgba(100, 255, 218, 0.3);
      }

      .stem-tagline {
        color: #8892b0;
        font-size: 1.1rem;
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      /* Launch card */
      .launch-card {
        background: rgba(17, 34, 64, 0.7);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(100, 255, 218, 0.2);
        border-radius: 20px;
        padding: 3rem;
        width: 100%;
        max-width: 600px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      }

      .card-title {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-bottom: 2rem;
        color: #64ffda;
        font-size: 1.5rem;
      }

      .card-title svg {
        width: 30px;
        height: 30px;
        stroke: #64ffda;
      }

      /* Launch button */
      .launch-btn {
        width: 100%;
        padding: 1.5rem;
        background: linear-gradient(135deg, #64ffda 0%, #00bcd4 100%);
        border: none;
        border-radius: 15px;
        color: #0a192f;
        font-size: 1.8rem;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        transition: transform 0.2s, box-shadow 0.2s;
        margin-bottom: 2rem;
        box-shadow: 0 10px 20px rgba(100, 255, 218, 0.2);
      }

      .launch-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 30px rgba(100, 255, 218, 0.3);
      }

      .launch-btn:active {
        transform: translateY(2px);
        box-shadow: 0 5px 10px rgba(100, 255, 218, 0.2);
      }

      .launch-btn svg {
        width: 30px;
        height: 30px;
        stroke: #0a192f;
        stroke-width: 2;
      }

      /* STEM info grid */
      .stem-info {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1rem;
        margin-top: 2rem;
      }

      .info-item {
        text-align: center;
        padding: 1rem;
        background: rgba(10, 25, 47, 0.5);
        border-radius: 10px;
        border: 1px solid rgba(100, 255, 218, 0.1);
      }

      .info-item .value {
        color: #64ffda;
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 0.3rem;
      }

      .info-item .label {
        color: #8892b0;
        font-size: 0.8rem;
        text-transform: uppercase;
      }

      /* Main iframe */
      #stem-iframe {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
        z-index: 5;
        background: #0a192f;
        display: none;
      }

      #stem-iframe.active {
        display: block;
      }

      /* STEM Control Bar */
      .control-bar {
        position: fixed;
        bottom: -100px;
        left: 0;
        right: 0;
        background: rgba(17, 34, 64, 0.95);
        backdrop-filter: blur(10px);
        border-top: 1px solid rgba(100, 255, 218, 0.3);
        padding: 1rem 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        z-index: 10;
        transition: bottom 0.3s ease;
        box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.3);
      }

      .control-bar.active {
        bottom: 0;
      }

      .nav-group {
        display: flex;
        gap: 1rem;
      }

      .stem-btn {
        background: rgba(100, 255, 218, 0.1);
        border: 1px solid rgba(100, 255, 218, 0.3);
        border-radius: 10px;
        padding: 0.8rem 1.2rem;
        color: #64ffda;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        transition: all 0.2s;
        font-weight: 500;
      }

      .stem-btn:hover:not(:disabled) {
        background: rgba(100, 255, 218, 0.2);
        border-color: #64ffda;
        transform: translateY(-2px);
      }

      .stem-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      .stem-btn svg {
        width: 20px;
        height: 20px;
        stroke: #64ffda;
      }

      /* URL bar */
      .url-bar {
        flex: 1;
        max-width: 600px;
        margin: 0 2rem;
      }

      .url-bar input {
        width: 100%;
        padding: 0.8rem 1.2rem;
        background: rgba(10, 25, 47, 0.8);
        border: 1px solid rgba(100, 255, 218, 0.3);
        border-radius: 10px;
        color: #ffffff;
        font-size: 0.9rem;
        outline: none;
        transition: border-color 0.2s;
      }

      .url-bar input:focus {
        border-color: #64ffda;
      }

      /* Loading overlay */
      .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(10, 25, 47, 0.9);
        backdrop-filter: blur(5px);
        z-index: 100;
        display: none;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        gap: 2rem;
      }

      .loading-overlay.active {
        display: flex;
      }

      .stem-spinner {
        width: 60px;
        height: 60px;
        border: 4px solid rgba(100, 255, 218, 0.3);
        border-top-color: #64ffda;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      .loading-text {
        color: #64ffda;
        font-size: 1.2rem;
        letter-spacing: 2px;
      }

      .loading-text span {
        animation: pulse 1.5s ease infinite;
        display: inline-block;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      /* Footer links */
      .stem-footer {
        position: fixed;
        bottom: 1rem;
        right: 1rem;
        display: flex;
        gap: 1rem;
        z-index: 15;
        background: rgba(17, 34, 64, 0.7);
        backdrop-filter: blur(5px);
        padding: 0.5rem 1rem;
        border-radius: 30px;
        border: 1px solid rgba(100, 255, 218, 0.2);
      }

      .stem-footer a {
        color: #8892b0;
        text-decoration: none;
        font-size: 0.8rem;
        display: flex;
        align-items: center;
        gap: 0.3rem;
        transition: color 0.2s;
      }

      .stem-footer a:hover {
        color: #64ffda;
      }

      .stem-footer svg {
        width: 14px;
        height: 14px;
        stroke: currentColor;
      }

      /* Responsive */
      @media (max-width: 768px) {
        .stem-brand h1 {
          font-size: 2.5rem;
        }

        .launch-card {
          padding: 2rem;
        }

        .control-bar {
          flex-wrap: wrap;
          gap: 1rem;
        }

        .url-bar {
          order: 3;
          max-width: 100%;
          margin: 0;
        }

        .stem-footer {
          bottom: 5rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="learnsphere-container">
      <!-- Hero Section -->
      <div class="hero-section" id="heroSection">
        <!-- STEM Branding -->
        <div class="stem-brand">
          <div class="stem-icon">
            <!-- Science icon -->
            <svg viewBox="0 0 24 24">
              <path d="M10 2v8L4 20v2h16v-2l-6-10V2" />
              <line x1="4" y1="22" x2="20" y2="22" />
              <line x1="8" y1="7" x2="16" y2="7" />
            </svg>

            <!-- Tech icon -->
            <svg viewBox="0 0 24 24">
              <rect x="2" y="3" width="20" height="14" rx="2" />
              <line x1="8" y1="21" x2="16" y2="21" />
              <line x1="12" y1="17" x2="12" y2="21" />
            </svg>

            <!-- Engineering icon -->
            <svg viewBox="0 0 24 24">
              <path
                d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
              />
              <polyline points="14 2 14 8 20 8" />
              <line x1="16" y1="13" x2="8" y2="13" />
              <line x1="16" y1="17" x2="8" y2="17" />
              <polyline points="10 9 9 9 8 9" />
            </svg>

            <!-- Math icon -->
            <svg viewBox="0 0 24 24">
              <line x1="4" y1="4" x2="20" y2="20" />
              <line x1="20" y1="4" x2="4" y2="20" />
              <circle cx="12" cy="12" r="2" />
            </svg>
          </div>
          <h1>LEARNSPHERE</h1>
          <div class="stem-tagline">STEM • LEARNING • INNOVATION</div>
        </div>

        <!-- Launch Card -->
        <div class="launch-card">
          <div class="card-title">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="8" x2="12" y2="16" />
              <line x1="8" y1="12" x2="16" y2="12" />
            </svg>
            <span>STEM LAB ACCESS</span>
          </div>

          <!-- Main Launch Button -->
          <button class="launch-btn" id="launchNowGG">
            <svg viewBox="0 0 24 24">
              <polygon points="5 3 19 12 5 21 5 3" />
            </svg>
            LAUNCH ROBLOX STUDIO
            <svg viewBox="0 0 24 24">
              <line x1="5" y1="12" x2="19" y2="12" />
              <polyline points="12 5 19 12 12 19" />
            </svg>
          </button>

          <!-- STEM Info Grid -->
          <div class="stem-info">
            <div class="info-item">
              <div class="value">⚡ 60+</div>
              <div class="label">STEM Modules</div>
            </div>
            <div class="info-item">
              <div class="value">🎮 100%</div>
              <div class="label">Interactive</div>
            </div>
            <div class="info-item">
              <div class="value">🚀 24/7</div>
              <div class="label">Lab Access</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Main Iframe -->
      <iframe id="stem-iframe" src="about:blank"></iframe>

      <!-- Control Bar -->
      <div class="control-bar" id="controlBar">
        <div class="nav-group">
          <button class="stem-btn" id="backBtn" disabled>
            <svg viewBox="0 0 24 24">
              <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
            Back
          </button>
          <button class="stem-btn" id="forwardBtn" disabled>
            <svg viewBox="0 0 24 24">
              <path d="M5 12h14M12 5l7 7-7 7" />
            </svg>
            Forward
          </button>
          <button class="stem-btn" id="refreshBtn">
            <svg viewBox="0 0 24 24">
              <path d="M23 4v6h-6M1 20v-6h6" />
              <path
                d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"
              />
            </svg>
            Refresh
          </button>
        </div>

        <!-- URL Bar -->
        <div class="url-bar">
          <input
            type="text"
            id="urlInput"
            placeholder="Enter URL..."
            value="https://nowgg.fun/apps/a/19900/b.html"
          />
        </div>

        <div class="nav-group">
          <button class="stem-btn" id="homeBtn">
            <svg viewBox="0 0 24 24">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
              <polyline points="9 22 9 12 15 12 15 22" />
            </svg>
            Home
          </button>
        </div>
      </div>

      <!-- Loading Overlay -->
      <div class="loading-overlay" id="loadingOverlay">
        <div class="stem-spinner"></div>
        <div class="loading-text">
          <span>L</span>
          <span>O</span>
          <span>A</span>
          <span>D</span>
          <span>I</span>
          <span>N</span>
          <span>G</span>
          <span>.</span>
          <span>.</span>
          <span>.</span>
        </div>
      </div>

      <!-- Footer Links -->
      <div class="stem-footer">
        <a href="#">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10" />
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
            <line x1="12" y1="17" x2="12.01" y2="17" />
          </svg>
          About
        </a>
        <a href="#">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
            <line x1="3" y1="9" x2="21" y2="9" />
            <line x1="9" y1="21" x2="9" y2="9" />
          </svg>
          STEM Lab
        </a>
        <a href="#">
          <svg viewBox="0 0 24 24">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
          </svg>
          Privacy
        </a>
      </div>
    </div>

    <script>
      (function () {
        // Configuration
        const NOWGG_URL = "https://nowgg.fun/apps/a/19900/b.html";
        const PROXY_PREFIX = "/service/education/"; // Keep the same proxy structure

        // DOM Elements
        const heroSection = document.getElementById("heroSection");
        const stemIframe = document.getElementById("stem-iframe");
        const controlBar = document.getElementById("controlBar");
        const loadingOverlay = document.getElementById("loadingOverlay");
        const launchBtn = document.getElementById("launchNowGG");
        const backBtn = document.getElementById("backBtn");
        const forwardBtn = document.getElementById("forwardBtn");
        const refreshBtn = document.getElementById("refreshBtn");
        const homeBtn = document.getElementById("homeBtn");
        const urlInput = document.getElementById("urlInput");

        // History management
        let historyStack = [];
        let currentIndex = -1;

        // Ultra Violet encoding (same as working example)
        function encodeUrl(url) {
          // Base64 encode and make URL-safe (same as UV)
          return btoa(url)
            .replace(/=/g, "")
            .replace(/\+/g, "-")
            .replace(/\//g, "_");
        }

        // Get proxied URL (maintains same structure)
        function getProxiedUrl(targetUrl) {
          if (!targetUrl.startsWith("http")) {
            targetUrl = "https://" + targetUrl;
          }
          return PROXY_PREFIX + encodeUrl(targetUrl);
        }

        // Load URL in iframe
        function loadUrl(url) {
          if (!url) return;

          // Show loading
          loadingOverlay.classList.add("active");

          const proxiedUrl = getProxiedUrl(url);

          // Add to history
          if (currentIndex < historyStack.length - 1) {
            historyStack = historyStack.slice(0, currentIndex + 1);
          }
          historyStack.push(proxiedUrl);
          currentIndex = historyStack.length - 1;

          // Update UI
          heroSection.classList.add("hidden");
          stemIframe.classList.add("active");
          controlBar.classList.add("active");

          // Load in iframe
          stemIframe.src = proxiedUrl;
          urlInput.value = url;

          updateNavButtons();
        }

        // Update navigation buttons
        function updateNavButtons() {
          backBtn.disabled = currentIndex <= 0;
          forwardBtn.disabled = currentIndex >= historyStack.length - 1;
        }

        // Iframe load handler
        stemIframe.onload = function () {
          loadingOverlay.classList.remove("active");

          try {
            // Try to update URL input with current location
            const iframeUrl = stemIframe.contentWindow.location.href;
            // Extract original URL from proxied URL if possible
            urlInput.value = iframeUrl;
          } catch (e) {
            // Cross-origin - keep existing URL
          }
        };

        stemIframe.onerror = function () {
          loadingOverlay.classList.remove("active");
          alert("Failed to load STEM Lab content. Please try again.");
        };

        // Launch button click
        launchBtn.addEventListener("click", function () {
          loadUrl(NOWGG_URL);
        });

        // Navigation buttons
        backBtn.addEventListener("click", function () {
          if (currentIndex > 0) {
            currentIndex--;
            stemIframe.src = historyStack[currentIndex];
            updateNavButtons();

            // Update URL input
            try {
              urlInput.value = stemIframe.contentWindow.location.href;
            } catch (e) {}
          }
        });

        forwardBtn.addEventListener("click", function () {
          if (currentIndex < historyStack.length - 1) {
            currentIndex++;
            stemIframe.src = historyStack[currentIndex];
            updateNavButtons();

            try {
              urlInput.value = stemIframe.contentWindow.location.href;
            } catch (e) {}
          }
        });

        refreshBtn.addEventListener("click", function () {
          stemIframe.src = stemIframe.src;
        });

        homeBtn.addEventListener("click", function () {
          heroSection.classList.remove("hidden");
          stemIframe.classList.remove("active");
          controlBar.classList.remove("active");
          stemIframe.src = "about:blank";
          historyStack = [];
          currentIndex = -1;
        });

        // URL input handling
        urlInput.addEventListener("keypress", function (e) {
          if (e.key === "Enter") {
            const url = this.value.trim();
            if (url) {
              loadUrl(url);
            }
          }
        });

        // Auto-load now.gg on page load (optional - remove if you want manual launch)
        // Uncomment the line below if you want auto-load
        // window.addEventListener('load', () => loadUrl(NOWGG_URL));

        // Keyboard shortcuts
        document.addEventListener("keydown", function (e) {
          // Ctrl/Cmd + L to focus URL bar
          if ((e.ctrlKey || e.metaKey) && e.key === "l") {
            e.preventDefault();
            urlInput.focus();
            urlInput.select();
          }

          // Ctrl/Cmd + R to refresh
          if ((e.ctrlKey || e.metaKey) && e.key === "r") {
            e.preventDefault();
            refreshBtn.click();
          }

          // Alt + Left for back
          if (e.altKey && e.key === "ArrowLeft") {
            e.preventDefault();
            backBtn.click();
          }

          // Alt + Right for forward
          if (e.altKey && e.key === "ArrowRight") {
            e.preventDefault();
            forwardBtn.click();
          }
        });
      })();
    </script>
  </body>
</html>
